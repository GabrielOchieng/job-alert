name: ATS Deep Scout Discovery

on:
  schedule:
    # Runs at minute 0 of every 5th hour
    - cron: "0 */5 * * *"
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install node-fetch p-limit @supabase/supabase-js dotenv

      - name: Execute Scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ats-deep-scout.mjs
