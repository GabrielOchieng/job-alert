name: Direct-ATS Deep Scout

on:
  schedule:
    - cron: "0 10 * * *" # Runs daily at 10:00 AM UTC (1:00 PM Nairobi)
  workflow_dispatch: # Manual trigger

jobs:
  scrape-ats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install node-fetch p-limit @supabase/supabase-js dotenv

      - name: Run Deep Scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/ats-deep-scout.mjs
