name: VC-Tier Global Scout Main

on:
  schedule:
    - cron: "0 */5 * * *" # Every 5 hours
  workflow_dispatch:

jobs:
  run-vc-scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        # ADDED @mendable/firecrawl-js here
        run: npm install node-fetch p-limit @supabase/supabase-js dotenv @mendable/firecrawl-js
      - name: Execute VC Job Scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # ADDED THIS LINE - This is what was causing the crash
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node scripts/vc-ingestmain.mjs
