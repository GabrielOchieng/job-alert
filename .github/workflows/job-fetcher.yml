name: 3-Hour Job Fetcher

on:
  schedule:
    # This runs every 3 hours (0, 3, 6, 9, 12, etc.)
    - cron: "0 */3 * * *"
  workflow_dispatch: # Allows you to run it manually from the GitHub UI for testing

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Hit RSS Cron
        run: |
          curl -X GET "https://job-alert-mu.vercel.app/api/cron/rss" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Wait 15 seconds
        run: sleep 15

      - name: Hit API Cron
        run: |
          curl -X GET "https://job-alert-mu.vercel.app/api/cron/api" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
