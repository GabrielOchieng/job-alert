name: Global RemHim Job Fetcher

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Hit Global API Cron (Himalayas/Remotive - Free)
        run: |
          curl -i -X GET "https://job-alert-mu.vercel.app/api/cron/global" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
