name: Jobgether Remote Scout

on:
  schedule:
    - cron: "0 */12 * * *" # Twice a day
  workflow_dispatch: # Manual trigger

jobs:
  jobgether-scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        # Added 'resend' to the install list
        run: npm install @mendable/firecrawl-js @supabase/supabase-js resend dotenv

      - name: Run Jobgether Scout
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # ADDED THESE TWO LINES BELOW
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
        run: node scripts/jobgether-scout.mjs
